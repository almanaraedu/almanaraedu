<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معهد المنارة التعليمي</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
text-align:center;
direction:rtl;
}

header{
background:#0d47a1;
color:white;
padding:25px;
font-size:24px;
}

section{
padding:40px;
}

.cards{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
width:280px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
font-size:20px;
cursor:pointer;
}

.card:hover{
background:#eef2ff;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:25px;
background:#0d47a1;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
}

.side-menu{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#1e4fa3;
padding-top:60px;
transition:0.3s;
}

.side-menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
font-size:18px;
}

.side-menu a:hover{
background:#0d3b82;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:30px;
padding:15px;
border-radius:50%;
text-decoration:none;
}

</style>

</head>

<body>

<header>
معهد المنارة التعليمي
</header>

<button class="menu-btn" onclick="openMenu()">☰</button>

<div id="sideMenu" class="side-menu">

<a href="#" onclick="home()">الرئيسية</a>

<a href="#" onclick="school()">المراحل المدرسية</a>

<a href="#" onclick="university()">المرحلة الجامعية</a>

<a href="https://wa.me/96551693563">تواصل معنا</a>

</div>

<section id="content">

<h2>اختر القسم</h2>

<div class="cards">

<div class="card" onclick="school()">
📚 المراحل المدرسية
</div>

<div class="card" onclick="university()">
🎓 المرحلة الجامعية
</div>

</div>

</section>

<a href="https://wa.me/96551693563" class="whatsapp">💬</a>

<script>

function openMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.left=="0px"){
menu.style.left="-250px";
}else{
menu.style.left="0px";
}

}

function home(){

document.getElementById("content").innerHTML=

`
<h2>اختر القسم</h2>

<div class="cards">

<div class="card" onclick="school()">
📚 المراحل المدرسية
</div>

<div class="card" onclick="university()">
🎓 المرحلة الجامعية
</div>

</div>
`;

}

function school(){

document.getElementById("content").innerHTML=

`
<h2>اختر نوع المدرسة</h2>

<div class="cards">

<div class="card" onclick="government()">
🏫 المدارس الحكومية
</div>

<div class="card">
🎓 Private Schools
</div>

</div>
`;

}

function government(){

document.getElementById("content").innerHTML=

`
<h2>اختر المرحلة</h2>

<div class="cards">

<div class="card">الصف الأول</div>

<div class="card">الصف الثاني</div>

<div class="card">الصف الثالث</div>

<div class="card">الصف الرابع</div>

<div class="card">الصف الخامس</div>

<div class="card">الصف السادس</div>

<div class="card">الصف السابع</div>

<div class="card">الصف الثامن</div>

<div class="card">الصف التاسع</div>

<div class="card">الصف العاشر</div>

<div class="card">الصف الحادي عشر</div>

<div class="card">الصف الثاني عشر</div>

</div>
`;

}

function university(){

document.getElementById("content").innerHTML=

`
<h2>المرحلة الجامعية</h2>

<div class="cards">

<div class="card">
التطبيقي
</div>

<div class="card">
جامعة الكويت
</div>

<div class="card">
الجامعة الاسترالية
</div>

</div>
`;

}

</script>

</body>
</html>
