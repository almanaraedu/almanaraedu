<!DOCTYPE html>


<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معهد المنارة التعليمي</title>


<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
direction:rtl;
text-align:center;
}

header{
background:#0d47a1;
color:white;
padding:25px;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
font-size:18px;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
background:#0d47a1;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
z-index:1000;
}

.side-menu{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#1e4fa3;
padding-top:60px;
transition:0.3s;
}

.side-menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
font-size:18px;
}

.side-menu a:hover{
background:#0d3b82;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>


</head>


<body>


<header>
<h1>معهد المنارة التعليمي</h1>
</header>


☰

<div id="sideMenu" class="side-menu">


الرئيسية
المراحل المدرسية
المرحلة الجامعية

</div>


<div id="content">


<h2>اختر القسم</h2>


<div class="cards">


<div class="card" onclick="school()">
📚 المراحل المدرسية
</div>


<div class="card" onclick="university()">
🎓 المرحلة الجامعية
</div>


</div>


</div>


<a href="https://wa.me/96551693563" class="whatsapp">
💬
</a>


<script>

function openMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.left=="0px"){
menu.style.left="-260px";
}else{
menu.style.left="0px";
}

}

function home(){
location.reload();
}

function school(){

document.getElementById("content").innerHTML=`

<h2>نوع المدارس</h2>

<div class="cards">

<div class="card" onclick="grades()">
🏫 مدارس حكومية
</div>

<div class="card" onclick="grades()">
🎓 مدارس خاصة
</div>

</div>

`;

}

function grades(){

let html="";

for(let i=1;i<=12;i++){

html+=`<div class="card" onclick="term('الصف ${i}')">
الصف ${i}
</div>`;

}

document.getElementById("content").innerHTML=`

<h2>الصفوف</h2>

<div class="cards">

${html}

</div>

`;

}

function term(grade){

document.getElementById("content").innerHTML=`

<h2>${grade}</h2>

<div class="cards">

<div class="card" onclick="subjects('${grade}','الفصل الأول')">
الفصل الدراسي الأول
</div>

<div class="card" onclick="subjects('${grade}','الفصل الثاني')">
الفصل الدراسي الثاني
</div>

</div>

`;

}

function subjects(grade,term){

let list=[

"عربي",
"English",
"رياضيات",
"Science",
"Social Studies",
"Computer",
"Islamic"

];

let html="";

list.forEach(s=>{

html+=`<div class="card" onclick="subject('${grade}','${s}')">
${s}
</div>`;

});

document.getElementById("content").innerHTML=`

<h2>${grade} - ${term}</h2>

<div class="cards">

${html}

</div>

`;

}

function subject(grade,subject){

document.getElementById("content").innerHTML=`

<h2>${subject}</h2>

<div class="cards">

<div class="card" onclick="book('${grade}','${subject}')">
👨‍🏫 حجز مع المدرس
</div>

<div class="card" onclick="videos()">
🎥 فيديوهات شرح
</div>

</div>

`;

}

function book(grade,subject){

let msg=\`مرحبا أريد حجز حصة

الصف: \${grade}

المادة: \${subject}\`;

window.open("https://wa.me/96551693563?text="+encodeURIComponent(msg));

}

function videos(){

alert("يمكن إضافة فيديوهات الشرح هنا");

}

function university(){

document.getElementById("content").innerHTML=`

<h2>المرحلة الجامعية</h2>

<div class="cards">

<div class="card">
التطبيقي
</div>

<div class="card">
جامعة الكويت
</div>

<div class="card">
الجامعة الأسترالية
</div>

</div>

`;

}

</script>


</body>
</html>
:::
