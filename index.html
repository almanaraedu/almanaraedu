function gov(){

document.getElementById("content").innerHTML = `

<div class="title">المراحل التعليمية</div>

<div class="card" onclick="middle()">إعدادي</div>

<div class="card" onclick="secondary()">ثانوي</div>

</div>

}

function privateSchool(){

let grades="";

for(let i=1;i<=12;i++){

}

document.getElementById("content").innerHTML = `

function primary(){

document.getElementById("content").innerHTML = `

<div class="cards">

<div class="card" onclick="term('الصف الثالث')">الصف الثالث</div>

<div class="card" onclick="term('الصف الرابع')">الصف الرابع</div>

<div class="card" onclick="term('الصف الخامس')">الصف الخامس</div>

</div>

`;

}

function middle(){

document.getElementById("content").innerHTML = `

<div class="title">المرحلة الإعدادية</div>

<div class="card" onclick="term('الصف السادس')">الصف السادس</div>

function secondary(){

function term(grade){

document.getElementById("content").innerHTML = `

<div class="title">${grade}</div>

<div class="cards">

<div class="card" onclick="subjects('${grade}','الفصل الأول')">الفصل الدراسي الأول</div>

function subjects(grade,term){

let subjects=[

"عربي",
"English",
"رياضيات",
"Science",
"Social Studies",
"Computer",
"Islamic"

];

let html="";

subjects.forEach(s=>{

html+=`<div class="card" onclick="subject('${grade}','${s}')">${s}</div>`;

});

document.getElementById("content").innerHTML = `

<div class="title">${grade} - ${term}</div>

<div class="cards">

${html}

</div>

`;

}

function subject(grade,subject){

document.getElementById("content").innerHTML = `

<div class="title">${subject}</div>

<button onclick="book('${grade}','${subject}')">حجز مع المدرس</button>

}

الصف: ${grade}

window.open("https://wa.me/96551693563?text="+encodeURIComponent(msg));
