<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم معهد المنارة</title><style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
direction:rtl;
margin:0;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
width:90%;
max-width:400px;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#1e4fa3;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#163d82;
}

.msg{
margin-top:20px;
font-size:18px;
color:green;
}

</style></head>
<body><h1>لوحة تحكم معهد المنارة</h1><input id="title" placeholder="اسم الدرس"><br>
<input id="grade" placeholder="الصف"><br>
<input id="semester" placeholder="الفصل"><br>
<input id="subject" placeholder="المادة"><br>
<input id="url" placeholder="رابط الفيديو embed"><br>

<button onclick="addVideo()">إضافة الفيديو</button>

<div id="msg" class="msg"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAwWwFCuLQDCnWgSzqYqUrZZrXywN88MFg",
authDomain: "almanara-edu.firebaseapp.com",
projectId: "almanara-edu",
storageBucket: "almanara-edu.firebasestorage.app",
messagingSenderId: "755423201331",
appId: "1:755423201331:web:957e58dcccc796d8513b46",
measurementId: "G-JK6QPGCJRE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addVideo = async function(){

let title=document.getElementById("title").value
let grade=document.getElementById("grade").value
let semester=document.getElementById("semester").value
let subject=document.getElementById("subject").value
let url=document.getElementById("url").value

await addDoc(collection(db,"Videos"),{
Title:title,
grade:grade,
semester:semester,
subject:subject,
Url:url
})

document.getElementById("msg").innerHTML="✅ تم إضافة الفيديو بنجاح"

document.getElementById("title").value=""
document.getElementById("grade").value=""
document.getElementById("semester").value=""
document.getElementById("subject").value=""
document.getElementById("url").value=""

}

</script></body>
</html>
