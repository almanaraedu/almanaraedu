<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم معهد المنارة</title><style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
direction:rtl;
padding:30px;
}

h1{
margin-bottom:20px;
}

input,select{
width:90%;
max-width:400px;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#1e4fa3;
color:white;
padding:10px 18px;
border:none;
border-radius:6px;
margin:5px;
cursor:pointer;
}

button:hover{
background:#163d82;
}

.videoCard{
background:white;
padding:15px;
margin:15px auto;
max-width:400px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.msg{
color:green;
font-size:18px;
}

</style></head>
<body><h1>لوحة تحكم معهد المنارة</h1><div id="login"><input id="pass" placeholder="ادخل كلمة السر">
<br>
<button onclick="login()">دخول</button></div><div id="panel" style="display:none"><input id="title" placeholder="اسم الدرس"><select id="grade">
<option value="">اختر الصف</option>
<option>الصف الأول</option>
<option>الصف الثاني</option>
<option>الصف الثالث</option>
<option>الصف الرابع</option>
<option>الصف الخامس</option>
<option>الصف السادس</option>
<option>الصف السابع</option>
<option>الصف الثامن</option>
<option>الصف التاسع</option>
<option>الصف العاشر</option>
<option>الصف الحادي عشر</option>
<option>الصف الثاني عشر</option>
</select><select id="semester">
<option value="">اختر الفصل</option>
<option>الفصل الأول</option>
<option>الفصل الثاني</option>
</select><select id="subject">
<option value="">اختر المادة</option>
<option>اللغة العربية</option>
<option>اللغة الإنجليزية</option>
<option>الرياضيات</option>
<option>العلوم</option>
<option>الاجتماعيات</option>
<option>الحاسوب</option>
<option>التربية الإسلامية</option>
</select><input id="url" placeholder="رابط فيديو يوتيوب"><br><button onclick="addVideo()">إضافة الفيديو</button>

<div id="msg" class="msg"></div><h2>الفيديوهات</h2><div id="videos"></div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAwWwFCuLQDCnWgSzqYqUrZZrXywN88MFg",
authDomain: "almanara-edu.firebaseapp.com",
projectId: "almanara-edu",
storageBucket: "almanara-edu.firebasestorage.app",
messagingSenderId: "755423201331",
appId: "1:755423201331:web:957e58dcccc796d8513b46",
measurementId: "G-JK6QPGCJRE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login=function(){

let p=document.getElementById("pass").value

if(p=="123456"){

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"
loadVideos()

}else{

alert("كلمة السر خطأ")

}

}

function convertYoutube(url){

if(url.includes("youtu.be")){
let id=url.split("/").pop()
return "https://www.youtube.com/embed/"+id
}

if(url.includes("watch?v=")){
let id=url.split("v=")[1]
return "https://www.youtube.com/embed/"+id
}

return url

}

window.addVideo = async function(){

let title=document.getElementById("title").value
let grade=document.getElementById("grade").value
let semester=document.getElementById("semester").value
let subject=document.getElementById("subject").value
let url=document.getElementById("url").value

url=convertYoutube(url)

await addDoc(collection(db,"Videos"),{
Title:title,
grade:grade,
semester:semester,
subject:subject,
Url:url
})

document.getElementById("msg").innerHTML="✅ تم إضافة الفيديو بنجاح"

loadVideos()

}

async function loadVideos(){

const querySnapshot = await getDocs(collection(db,"Videos"))

let html=""

querySnapshot.forEach((d)=>{

let data=d.data()

html+=`

<div class="videoCard">

<h3>${data.Title}</h3>

<iframe width="100%" height="200"
src="${data.Url}"
frameborder="0"
allowfullscreen></iframe>

<br>

<button onclick="deleteVideo('${d.id}')">حذف</button>

<button onclick="editVideo('${d.id}','${data.Title}','${data.Url}')">تعديل</button>

</div>

`

})

document.getElementById("videos").innerHTML=html

}

window.deleteVideo=async function(id){

await deleteDoc(doc(db,"Videos",id))

loadVideos()

}

window.editVideo=function(id,title,url){

let newTitle=prompt("اسم الدرس",title)

let newUrl=prompt("رابط الفيديو",url)

updateDoc(doc(db,"Videos",id),{

Title:newTitle,
Url:newUrl

})

loadVideos()

}

</script></body>
</html>
